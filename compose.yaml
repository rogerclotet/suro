# Production web app (Next.js standalone) behind Pangolin/Traefik.
#
# The image is built and pushed by GitHub Actions; this file just runs it. Pangolin
# reaches the app two ways — point your route(s) for suro.clotet.dev and
# suroapp.cat at either (see AGENTS.md):
#   - a Pangolin local site -> 172.17.0.1:${WEB_PORT} (the host publish below), or
#   - the shared Docker network by name -> http://familia:3000.
# Nothing here touches the proxy config.
#
# Manage from SSH (bare commands, no flags or host .env needed):
#   docker compose pull && docker compose up -d   # deploy the latest image
#   docker compose ps                              # status / health
#   docker compose logs -f                         # tail logs
#   docker compose restart                         # restart
#   curl 172.17.0.1:$WEB_PORT/api/health           # app health, bypassing the proxy
#
# Overridable via shell env or an optional .env file in this directory:
#   WEB_IMAGE      registry path of the image     (CI exports the real one)
#   IMAGE_TAG      tag to run                      (default: latest; CI pins the commit SHA)
#   PROXY_NETWORK  shared network Pangolin is on   (default: familia-previews)
#   WEB_PORT       host port for the local publish (default: 3000; container always listens on 3000)
#   WEB_BIND       host address to publish on      (default: 172.17.0.1, the Docker bridge gateway Pangolin uses)

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/rogerclotet/suro}:${IMAGE_TAG:-latest}
    container_name: familia
    restart: unless-stopped
    env_file:
      # Optional runtime env. NEXT_PUBLIC_* are baked into the bundle at build
      # time, so the app needs nothing here to boot.
      - path: .env
        required: false
    ports:
      # Published on the Docker bridge gateway (172.17.0.1) so a Pangolin local site
      # targeting 172.17.0.1:${WEB_PORT} can reach it — the same pattern as the other
      # services on this host. Bridge interface only, not exposed publicly. Set
      # WEB_PORT to a free port; override WEB_BIND if your bridge gateway differs.
      - "${WEB_BIND:-172.17.0.1}:${WEB_PORT:-3000}:3000"
    networks:
      proxy:
        aliases:
          - familia # Pangolin/Traefik targets http://familia:3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-familia-previews}
