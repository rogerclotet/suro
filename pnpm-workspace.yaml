packages:
  - "apps/*"
  - "packages/*"

# Moved here from the root package.json "pnpm" field — pnpm 10.26+ reads these
# from the workspace manifest, not package.json.
overrides:
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  # Single React version across web + mobile (duplicate React breaks native).
  react: 19.2.3
  react-dom: 19.2.3
  # Security: pin patched transitive deps (API-compatible patch bumps).
  # ws<8.21.0 (via convex) memory-exhaustion DoS — GHSA-96hv-2xvq-fx4p.
  "ws@>=8.0.0 <8.21.0": ">=8.21.0"
  # postcss<8.5.10 (via next) XSS in CSS processing — GHSA-qx2v-qp2m-jg93.
  "postcss@<8.5.10": ">=8.5.10"

onlyBuiltDependencies:
  - "@napi-rs/canvas"
  - core-js
  - esbuild
  - msgpackr-extract
  - sharp
  - unrs-resolver

# @posthog/cli's postinstall downloads a prebuilt binary from GitHub releases,
# which hangs/ECONNRESETs in the CI Docker build. Skip the postinstall — the
# CLI fetches the binary lazily on first invocation (the prod source-map
# upload). Preview builds never invoke it (sourcemaps are gated on
# POSTHOG_API_KEY + POSTHOG_ENV_ID), so they no longer need the download.
ignoredBuiltDependencies:
  - "@posthog/cli"

# react-native-worklets' Babel plugin require()s @babel/generator at runtime but
# doesn't declare it; pnpm's strict layout then can't resolve it for Metro.
packageExtensions:
  react-native-worklets:
    dependencies:
      "@babel/generator": "^7.29.7"
      "@babel/traverse": "^7.29.7"
