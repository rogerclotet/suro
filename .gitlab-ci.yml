stages:
  - check
  - deploy

cache:
  paths:
    - client/node_modules/

server:
  stage: check
  image: python:3.10
  script:
    - cd server
    - pip install -r requirements.txt
  rules:
    - changes:
        - server/**/*

client:
  stage: check
  image: node:16-alpine
  script:
    - cd client
    - yarn install --production=false
    - yarn lint
  artifacts:
    paths:
      - client/node_modules/
  rules:
    - changes:
        - client/**/*

deploy_server:
  stage: deploy
  image: alpine
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x scripts/deploy_server.sh
    - scripts/deploy_server.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - changes:
        - server/**/*

deploy_client:
  stage: deploy
  image: alpine
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x scripts/deploy_client.sh
    - scripts/deploy_client.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - changes:
        - client/**/*
