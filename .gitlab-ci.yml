stages:
  - prepare
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

prepare:
  image: alpine
  stage: prepare
  variables:
    DATABASE_URL: $DATABASE_URL
    NEXTAUTH_SECRET: $NEXTAUTH_SECRET
    NEXTAUTH_URL: $NEXTAUTH_URL
    AUTH_TRUST_HOST: $AUTH_TRUST_HOST
    AUTH_GOOGLE_ID: $AUTH_GOOGLE_ID
    AUTH_GOOGLE_SECRET: $AUTH_GOOGLE_SECRET
    AUTH_RESEND_KEY: $AUTH_RESEND_KEY
    RESEND_EMAIL_FROM: $RESEND_EMAIL_FROM
    UPLOADTHING_SECRET: $UPLOADTHING_SECRET
    UPLOADTHING_APP_ID: $UPLOADTHING_APP_ID
    NEXT_PUBLIC_POSTHOG_KEY: $NEXT_PUBLIC_POSTHOG_KEY
    NEXT_PUBLIC_POSTHOG_HOST: $NEXT_PUBLIC_POSTHOG_HOST
    NEXT_PUBLIC_AXIOM_DATASET: $NEXT_PUBLIC_AXIOM_DATASET
    NEXT_PUBLIC_AXIOM_TOKEN: $NEXT_PUBLIC_AXIOM_TOKEN
  script:
    - echo "DATABASE_URL=$DATABASE_URL" > .env
    - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env
    - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env
    - echo "AUTH_TRUST_HOST=$AUTH_TRUST_HOST" >> .env
    - echo "AUTH_GOOGLE_ID=$AUTH_GOOGLE_ID" >> .env
    - echo "AUTH_GOOGLE_SECRET=$AUTH_GOOGLE_SECRET" >> .env
    - echo "AUTH_RESEND_KEY=$AUTH_RESEND_KEY" >> .env
    - echo "RESEND_EMAIL_FROM=$RESEND_EMAIL_FROM" >> .env
    - echo "UPLOADTHING_SECRET=$UPLOADTHING_SECRET" >> .env
    - echo "UPLOADTHING_APP_ID=$UPLOADTHING_APP_ID" >> .env
    - echo "NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY" >> .env
    - echo "NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST" >> .env
    - echo "NEXT_PUBLIC_AXIOM_DATASET=$NEXT_PUBLIC_AXIOM_DATASET" >> .env
    - echo "NEXT_PUBLIC_AXIOM_TOKEN=$NEXT_PUBLIC_AXIOM_TOKEN" >> .env
  artifacts:
    paths:
      - .env

build:
  image: docker:27.2.0
  stage: build
  services:
    - docker:27.2.0-dind
  needs:
    - prepare
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

deploy:
  image: alpine
  stage: deploy
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x scripts/deploy.sh
    - scripts/deploy.sh
  only:
    - main
