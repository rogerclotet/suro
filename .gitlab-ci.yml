stages:
  - check
  - deploy

check:
  stage: check
  image: node:25.1-slim
  before_script:
    - npm install -g pnpm@latest-10
    - pnpm install
  variables:
    SKIP_ENV_VALIDATION: "1"
    NEXT_TELEMETRY_DISABLED: "1"
  script:
    - pnpm biome:check
    - pnpm typecheck
    - pnpm test
    - pnpm run build
  artifacts:
    paths:
      - node_modules
      - test-report.xml
    reports:
      junit: test-report.xml

deploy:
  stage: deploy
  image: alpine
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x scripts/deploy.sh
    - scripts/deploy.sh
  only:
    - main
