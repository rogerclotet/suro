stages:
  - check
  - deploy

check:
  stage: check
  image: node:25.1-alpine
  before_script:
    - npm install -g corepack
    - corepack enable pnpm
    - pnpm install
  script:
    - pnpm lint
    - pnpm typecheck
    - pnpm test
  artifacts:
    paths:
      - node_modules
      - test-report.xml
    reports:
      junit: test-report.xml

deploy:
  stage: deploy
  image: alpine
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x scripts/deploy.sh
    - scripts/deploy.sh
  only:
    - main
