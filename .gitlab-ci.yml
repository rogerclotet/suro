stages:
  - check
  - build
  - deploy

workflow:
  rules:
    # Run for MRs (so preview jobs fire) and for the default branch (prod deploy).
    # Skip branch pipelines that have an open MR — the MR pipeline supersedes them.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

check:
  stage: check
  image: node:25.1-slim
  before_script:
    - npm install -g pnpm@latest-10
    - pnpm install
  variables:
    SKIP_ENV_VALIDATION: "1"
    NEXT_TELEMETRY_DISABLED: "1"
    # This is a throwaway validation build, not the deployed artifact — blank the
    # PostHog credentials so it never uploads source maps (those come from the
    # `build` job below). Protected CI variables would otherwise leak in on main.
    POSTHOG_API_KEY: ""
    POSTHOG_ENV_ID: ""
  script:
    - pnpm biome:check
    - pnpm typecheck
    - pnpm test
    - pnpm run build
  artifacts:
    paths:
      - node_modules
      - test-report.xml
    reports:
      junit: test-report.xml

build_preview:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Previews share the dev Convex deployment (NEXT_PUBLIC_CONVEX_URL_PREVIEW).
    - docker build
        --build-arg SKIP_ENV_VALIDATION=1
        --build-arg NEXT_PUBLIC_CONVEX_URL=$NEXT_PUBLIC_CONVEX_URL_PREVIEW
        --build-arg NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
        --build-arg NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
        -t $CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID .
    - docker push $CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID
  rules:
    # Preview is opt-in: trigger this job manually from the MR pipeline.
    # It doesn't block the pipeline, and deploy_preview waits on it.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg SKIP_ENV_VALIDATION=1
        --build-arg NEXT_PUBLIC_CONVEX_URL=$NEXT_PUBLIC_CONVEX_URL
        --build-arg NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
        --build-arg NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
        --build-arg POSTHOG_API_KEY=$POSTHOG_API_KEY
        --build-arg POSTHOG_ENV_ID=$POSTHOG_ENV_ID
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
        -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# Deploy the Convex backend (schema + functions) to the production deployment
# that CONVEX_DEPLOY_KEY belongs to. Runs before the web deploy (see needs:)
# so the new frontend always lands on an up-to-date backend.
convex_deploy:
  stage: build
  image: node:25.1-slim
  before_script:
    - npm install -g pnpm@latest-10
    - pnpm install --frozen-lockfile --filter backend...
  script:
    - cd packages/backend && npx convex deploy
  only:
    - main

deploy:
  stage: deploy
  image: alpine
  needs: [build, convex_deploy]
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x apps/web/scripts/deploy.sh
    - apps/web/scripts/deploy.sh
  only:
    - main

deploy_preview:
  stage: deploy
  image: alpine
  needs: [build_preview]
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x apps/web/scripts/deploy-preview.sh
    - apps/web/scripts/deploy-preview.sh
  environment:
    name: review/mr-$CI_MERGE_REQUEST_IID
    url: https://mr-$CI_MERGE_REQUEST_IID.suro.clotet.dev
    on_stop: stop_preview
    auto_stop_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stop_preview:
  stage: deploy
  image: alpine
  before_script:
    - apk add openssh-client sshpass
  script:
    - chmod +x apps/web/scripts/teardown-preview.sh
    - apps/web/scripts/teardown-preview.sh
  environment:
    name: review/mr-$CI_MERGE_REQUEST_IID
    action: stop
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# Mobile builds (Expo / EAS). main only, and only when mobile paths change.
# Android builds locally on the shared runner (eas build --local); iOS builds
# on EAS cloud (no macOS runners on gitlab.com free tier). Signing uses
# EAS-managed credentials, authenticated via EXPO_TOKEN.
# ---------------------------------------------------------------------------

.mobile_changes: &mobile_changes
  - apps/mobile/**/*
  - packages/backend/**/*
  - pnpm-lock.yaml
  - pnpm-workspace.yaml
  - .gitlab-ci.yml

# changes: only diffs real pushes; for web/api/schedule sources it always
# matches, so gate on push and leave a manual escape hatch for UI-run pipelines.
.mobile_rules: &mobile_rules
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
    changes: *mobile_changes
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "web"
    when: manual
    allow_failure: true

.mobile_android_local:
  stage: build
  image: reactnativecommunity/react-native-android:v20.1 # pinned; latest moves
  dependencies: [] # skip check's node_modules artifact
  timeout: 2h # first uncached Gradle build can exceed 1h
  variables:
    GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
  before_script:
    - n $(cat .node-version) # image ships Node 22; repo pins 25
    - npm install -g pnpm@latest-10 eas-cli
    - pnpm install --frozen-lockfile --filter mobile...
  rules: *mobile_rules

# Debug/internal Android build: release-mode APK on the dev Convex deployment
# (`preview` profile) — installable standalone from the job artifact.
build_mobile_android_preview:
  extends: .mobile_android_local
  script:
    - cd apps/mobile
    - eas build --platform android --profile preview --local --non-interactive
        --output "$CI_PROJECT_DIR/suro-preview.apk"
  artifacts:
    name: "suro-android-preview-$CI_COMMIT_SHORT_SHA"
    paths:
      - suro-preview.apk
    expire_in: 30 days

# Store-ready Android release: signed .aab (EAS-managed keystore), prod env,
# remote versionCode auto-incremented by eas-cli before the local build.
build_mobile_android_release:
  extends: .mobile_android_local
  script:
    - cd apps/mobile
    - eas build --platform android --profile production --local --non-interactive
        --output "$CI_PROJECT_DIR/suro-release.aab"
  artifacts:
    name: "suro-android-release-$CI_COMMIT_SHORT_SHA"
    paths:
      - suro-release.aab
    expire_in: 30 days

