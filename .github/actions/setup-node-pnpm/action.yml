name: Setup Node and pnpm
description: Install pnpm, Node.js, and workspace dependencies with a frozen lockfile
inputs:
  node-version:
    description: Node.js version
    required: false
    default: "25.1"
  install-filter:
    description: Optional pnpm filter suffix (e.g. web... or mobile...)
    required: false
    default: ""
  apt-packages:
    description: Space-separated apt packages to install before pnpm install
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - shell: bash
      run: |
        if [ -n "${{ inputs.apt-packages }}" ]; then
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ inputs.apt-packages }}
        fi
        if [ -n "${{ inputs.install-filter }}" ]; then
          pnpm install --frozen-lockfile --filter "${{ inputs.install-filter }}"
        else
          pnpm install --frozen-lockfile
        fi
