# Main CI/CD for Suro. Migrated from GitLab CI — path-gated jobs, PR checks, main
# deploys, and automatic mobile store submission after EAS builds finish.
#
# Per-area change sets (shared via .github/actions/detect-path-changes):
#   web     — web image build, deploy, PR compile-check
#   backend — Convex deploy
#   mobile  — EAS native builds + store submit (gated by mobile_release_gate:
#             version bump + matching CHANGELOG entry + native file changes)
#
# Triggers: pull requests to main, pushes to main. Feature-branch pushes alone
# do not run CI — open a PR to get checks (same as the old GitLab workflow rules).

name: Main CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect_path_changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.changes.outputs.web }}
      backend: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/detect-path-changes
        id: changes

  mobile_release_gate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to trigger EAS native builds
        id: gate
        run: node apps/mobile/scripts/should-build-native.mjs
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}

  repo_quality_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Lint, typecheck, test
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXT_TELEMETRY_DISABLED: "1"
          POSTHOG_API_KEY: ""
          POSTHOG_ENV_ID: ""
        run: |
          pnpm biome:check
          pnpm check:store-notes
          pnpm check:metadata
          pnpm check:i18n
          pnpm typecheck
          pnpm test

  web_pr_build:
    needs: detect_path_changes
    if: github.event_name == 'pull_request' && needs.detect_path_changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-filter: web...
      - name: Next.js production build (compile check)
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXT_TELEMETRY_DISABLED: "1"
          POSTHOG_API_KEY: ""
          POSTHOG_ENV_ID: ""
        run: pnpm run build

  web_and_backend_deploy:
    needs: [detect_path_changes, repo_quality_checks]
    if: |
      github.event_name == 'push' &&
      needs.repo_quality_checks.result == 'success' &&
      (needs.detect_path_changes.outputs.web == 'true' || needs.detect_path_changes.outputs.backend == 'true')
    uses: ./.github/workflows/reusable-web-deploy.yml
    with:
      web_changed: ${{ needs.detect_path_changes.outputs.web }}
      backend_changed: ${{ needs.detect_path_changes.outputs.backend }}
      commit_sha: ${{ github.sha }}
    secrets: inherit

  mobile_release:
    needs: [mobile_release_gate, repo_quality_checks]
    if: |
      github.event_name == 'push' &&
      needs.repo_quality_checks.result == 'success' &&
      needs.mobile_release_gate.outputs.should_build == 'true'
    uses: ./.github/workflows/reusable-mobile-release.yml
    with:
      commit_sha: ${{ github.sha }}
    secrets: inherit
