# Manually deploy an ephemeral preview for a pull request. Mirrors GitLab's
# build_preview + deploy_preview jobs (opt-in, web-gated).
#
# Run from Actions → "Preview deploy" → provide the PR number. Preview URL:
# https://mr-<pr>.suro.clotet.dev

name: Preview deploy

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: number

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/backend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'biome.json'
              - 'Dockerfile'
              - '.dockerignore'
              - 'compose.yaml'
              - '.github/workflows/**'

  build_preview:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:mr-${{ inputs.pr_number }}
          build-args: |
            SKIP_ENV_VALIDATION=1
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL_PREVIEW }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

  deploy_preview:
    needs: build_preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy preview environment
        env:
          CI_MERGE_REQUEST_IID: ${{ inputs.pr_number }}
          CI_REGISTRY: ghcr.io
          CI_REGISTRY_USER: ${{ github.repository_owner }}
          CI_REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
          CI_REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_IP: ${{ secrets.SSH_IP }}
          SSH_PROJECT_DIRECTORY: ${{ secrets.SSH_PROJECT_DIRECTORY }}
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends sshpass openssh-client
          chmod +x apps/web/scripts/deploy-preview.sh
          apps/web/scripts/deploy-preview.sh
