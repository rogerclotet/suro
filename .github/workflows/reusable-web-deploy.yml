# Reusable web + backend production deploy jobs. Called from ci.yml on pushes to
# main when web and/or backend paths change and repo quality checks passed.

name: Web and backend deploy

on:
  workflow_call:
    inputs:
      web_changed:
        description: Whether web-affecting paths changed
        required: true
        type: string
      backend_changed:
        description: Whether backend-affecting paths changed
        required: true
        type: string
      commit_sha:
        description: Commit SHA to build and deploy
        required: true
        type: string
    secrets:
      GITHUB_TOKEN:
        required: true
      NEXT_PUBLIC_CONVEX_URL:
        required: true
      NEXT_PUBLIC_POSTHOG_KEY:
        required: false
      NEXT_PUBLIC_POSTHOG_HOST:
        required: false
      POSTHOG_API_KEY:
        required: false
      POSTHOG_ENV_ID:
        required: false
      CONVEX_DEPLOY_KEY:
        required: true
      GHCR_PULL_TOKEN:
        required: true
      SSH_USERNAME:
        required: true
      SSH_PASSWORD:
        required: true
      SSH_IP:
        required: true
      SSH_PROJECT_DIRECTORY:
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  web_docker_build_push:
    if: inputs.web_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ inputs.commit_sha }}
            ${{ env.REGISTRY_IMAGE }}:latest
          build-args: |
            SKIP_ENV_VALIDATION=1
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
            POSTHOG_ENV_ID=${{ secrets.POSTHOG_ENV_ID }}

  backend_convex_deploy:
    if: inputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-filter: backend...
      - name: Deploy Convex backend
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy

  web_deploy_production:
    needs: [web_docker_build_push, backend_convex_deploy]
    if: |
      always() &&
      inputs.web_changed == 'true' &&
      needs.web_docker_build_push.result == 'success' &&
      (needs.backend_convex_deploy.result == 'success' || needs.backend_convex_deploy.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Deploy production web
        env:
          CI_COMMIT_SHA: ${{ inputs.commit_sha }}
          CI_REGISTRY: ghcr.io
          CI_REGISTRY_USER: ${{ github.repository_owner }}
          CI_REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
          CI_REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_IP: ${{ secrets.SSH_IP }}
          SSH_PROJECT_DIRECTORY: ${{ secrets.SSH_PROJECT_DIRECTORY }}
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends sshpass openssh-client
          chmod +x apps/web/scripts/deploy.sh
          apps/web/scripts/deploy.sh
