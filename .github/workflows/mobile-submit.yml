# Manual store re-submission for a commit that already built on main. The main
# CI workflow now waits for EAS builds and submits automatically; use this only
# to re-submit a specific commit (e.g. after a transient store error).

name: Mobile submit

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA on main (from the CI run that triggered EAS builds)
        required: true
        type: string
      platform:
        description: Platform to submit
        required: true
        type: choice
        options:
          - android
          - ios
          - both

permissions:
  contents: read
  actions: read

env:
  EXPO_APPLE_TEAM_ID: ${{ vars.EXPO_APPLE_TEAM_ID != '' && vars.EXPO_APPLE_TEAM_ID || '2XUF926TS6' }}

jobs:
  find_ci_run:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
    steps:
      - uses: actions/github-script@v7
        id: find
        with:
          script: |
            const sha = '${{ inputs.commit_sha }}';
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: sha,
              event: 'push',
              per_page: 5,
            });
            const run = data.workflow_runs.find((r) => r.conclusion === 'success');
            if (!run) {
              core.setFailed(`No successful Main CI/CD run found for commit ${sha}`);
              return;
            }
            core.setOutput('run_id', String(run.id));

  submit_android:
    needs: find_ci_run
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
      - uses: actions/download-artifact@v4
        with:
          name: suro-android-${{ inputs.commit_sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.find_ci_run.outputs.run_id }}
          path: apps/mobile/build
      - uses: ./.github/actions/mobile-submit-android
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
          play-service-account-json: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          redownload-if-missing: "true"

  submit_ios:
    needs: find_ci_run
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
      - uses: actions/download-artifact@v4
        with:
          name: suro-ios-${{ inputs.commit_sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.find_ci_run.outputs.run_id }}
          path: apps/mobile/build
      - uses: ./.github/actions/mobile-submit-ios
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
          expo-apple-team-id: ${{ env.EXPO_APPLE_TEAM_ID }}
          app-store-connect-api-key-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          app-store-connect-api-key-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          app-store-connect-api-key-issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          redownload-if-missing: "true"
